name: CI

# Build and lint all workspaces on every push and pull request.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile all workspaces (desktop + web)
        run: npm run compile

      - name: Lint
        run: npm run lint --if-present
